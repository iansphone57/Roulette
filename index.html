<!DOCTYPE html>
<html>
<head>
    <title>Roulette V1.01</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Roulette V1.01</h1>

    <!-- Spin History Panel -->
    <div id="spin-history-panel">
        <h2>Spin Entry</h2>
        <input id="spinInput" type="number" min="0" max="36" placeholder="Enter number">
        <button onclick="addSpin()">Add Spin</button>
        <button onclick="undoSpin()" id="undoBtn">Undo</button>

        <div id="historyList"></div>
    </div>

    <!-- Sector Heatmap -->
    <div id="sector-heatmap-panel">
        <h2>Sector Heatmap</h2>
        <div id="heatmapOutput"></div>
    </div>

    <!-- Prediction Engine -->
    <div id="prediction-panel">
        <h2>Predictions</h2>
        <div id="predictionOutput"></div>
    </div>

    <!-- Bias Stats -->
    <div id="bias-stats-panel">
        <h2>Bias Detection</h2>
        <div id="biasOutput"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
