<!DOCTYPE html>
<html>
<head>
    <title>Roulette V1.06</title>
    <link rel="stylesheet" href="style.css?v=1">
</head>

<body>

    <h1>Roulette V1.06</h1>

    <!-- Generate + Clear buttons -->
    <div id="topButtons">
        <button onclick="generateSpins()">Generate 1000</button>
        <button onclick="clearAll()">Clear</button>
    </div>

    <!-- Spin Entry Panel -->
    <div id="spin-history-panel">
        <h2>Spin Entry <span id="spinCount">(0 spins)</span></h2>

        <div id="entryRow">
            <input id="spinInput" type="number" min="0" max="36" placeholder="#">
            <button onclick="addSpin()">Add</button>
            <button onclick="undoSpin()">Undo</button>
        </div>

        <div id="historyList"></div>
        <div id="sampleStrength"></div>
    </div>

    <div id="sector-heatmap-panel">
        <h2>Sector Heatmap</h2>
        <div id="heatmapOutput"></div>
    </div>

    <div id="prediction-panel">
        <h2>Predictions</h2>
        <div id="predictionOutput"></div>
    </div>

    <div id="bias-stats-panel">
        <h2>Bias Detection</h2>
        <div id="biasOutput"></div>
    </div>

    <div id="trend-panel">
        <h2>Trend Detected</h2>
        <div id="trendOutput"></div>
    </div>

    <div id="coverage-panel">
        <h2>Coverage Map</h2>
        <div id="coverageOutput"></div>
    </div>

    <!-- IMPORTANT: cache-busted -->
    <script src="script.js?v=1"></script>

</body>
</html>
