<!DOCTYPE html>
<html>
<head>
    <title>Roulette Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Roulette Tracker</h1>

    <!-- Spin History Panel -->
    <div id="spin-history-panel">
        <h2>Spin History</h2>
        <input id="spinInput" type="number" min="0" max="36" placeholder="Enter number">
        <button onclick="addSpin()">Add Spin</button>

        <div id="historyList"></div>
    </div>

    <!-- Sector Stats -->
    <div id="sector-stats-panel">
        <h2>Sector Stats</h2>
        <div id="sectorOutput"></div>
    </div>

    <!-- Bias Stats -->
    <div id="bias-stats-panel">
        <h2>Bias Detection</h2>
        <div id="biasOutput"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
