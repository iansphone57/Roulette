<!DOCTYPE html>
<html>
<head>
    <title>Roulette V1.04</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Roulette V1.04</h1>

    <!-- Spin Entry Panel -->
    <div id="spin-history-panel">
        <h2>Spin Entry</h2>

        <!-- Input + Add + Undo on one line -->
        <div id="entryRow">
            <input id="spinInput" type="number" min="0" max="36" placeholder="Enter number">
            <button onclick="addSpin()">Add</button>
            <button onclick="undoSpin()" id="undoBtn">Undo</button>
        </div>

        <!-- One-line scrollable history -->
        <div id="historyList"></div>

        <!-- Sample strength indicator -->
        <div id="sampleStrength"></div>
    </div>

    <!-- Sector Heatmap -->
    <div id="sector-heatmap-panel">
        <h2>Sector Heatmap</h2>
        <div id="heatmapOutput"></div>
    </div>

    <!-- Prediction Engine -->
    <div id="prediction-panel">
        <h2>Predictions</h2>
        <div id="predictionOutput"></div>
    </div>

    <!-- Bias Stats -->
    <div id="bias-stats-panel">
        <h2>Bias Detection</h2>
        <div id="biasOutput"></div>
    </div>

    <!-- Trend + Coverage -->
    <div id="trend-panel">
        <h2>Trend Detected</h2>
        <div id="trendOutput"></div>
    </div>

    <div id="coverage-panel">
        <h2>Coverage Map</h2>
        <div id="coverageOutput"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
